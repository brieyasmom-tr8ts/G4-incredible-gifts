<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4 2026 - Retreat Slideshow</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #2a2320 0%, #1a1a1a 40%, #1e2a1e 100%);
            color: white;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Start screen */
        .start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            z-index: 10;
            overflow-y: auto;
        }
        .start-icon { font-size: 4rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .start-title { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; margin-bottom: 6px; }
        .start-subtitle { font-size: 1.15rem; color: rgba(255,255,255,0.65); margin-bottom: 24px; font-style: italic; }
        .start-count { font-size: 1rem; color: rgba(255,255,255,0.55); margin-bottom: 22px; }

        .filter-section { margin-bottom: 18px; max-width: 540px; width: 100%; }
        .filter-section-label { font-size: 0.85rem; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
        .filter-row {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1.5px dashed rgba(255,255,255,0.22);
            border-radius: 20px;
            background: transparent;
            color: rgba(255,255,255,0.35);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: line-through;
        }
        .filter-btn.active {
            background: rgba(201,144,138,0.35);
            border: 1.5px solid rgba(201,144,138,0.7);
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .filter-btn.active::before { content: '✓ '; color: rgba(255,255,255,0.85); }

        .filter-hint {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            margin: -4px 0 10px;
            font-style: italic;
        }
        .filter-quick {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .filter-quick-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.75);
            border-radius: 14px;
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
        }
        .filter-quick-btn:hover { background: rgba(255,255,255,0.16); }

        .speed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
        .speed-label { font-size: 0.95rem; color: rgba(255,255,255,0.65); }
        .speed-input {
            width: 70px; padding: 8px 10px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; background: rgba(255,255,255,0.1); color: white;
            font-family: 'Cormorant Garamond', serif; font-size: 1rem; text-align: center;
        }

        .start-btn {
            padding: 16px 40px;
            border: 2px solid rgba(201,144,138,0.5);
            border-radius: 14px;
            background: rgba(201,144,138,0.18);
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn:hover { background: rgba(201,144,138,0.32); border-color: rgba(201,144,138,0.7); }
        .start-error { margin-top: 14px; color: #e6a39a; font-size: 0.95rem; min-height: 1.2em; }

        /* Slides */
        .slide {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            padding: 40px 30px 130px;
        }
        .slide.active { display: flex; opacity: 1; }

        .slide-kicker {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(201,144,138,0.85);
            margin-bottom: 18px;
        }
        .slide-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.15;
            margin-bottom: 14px;
            max-width: 90vw;
        }
        .slide-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.75);
            text-align: center;
            margin-bottom: 22px;
            max-width: 80vw;
        }
        .slide-body {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            text-align: center;
            line-height: 1.5;
            max-width: 800px;
        }
        .slide-attribution {
            margin-top: 22px;
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: rgba(201,144,138,0.85);
            font-weight: 600;
        }

        .slide-photo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(201,144,138,0.5);
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            margin-bottom: 22px;
            background: rgba(255,255,255,0.06);
        }

        /* --- Vote / poll layout: question prominent at top, then a
           horizontal row with the voter's photo on the left and their
           choice rendered as an italic pull-quote on the right. --- */
        .vote-kicker {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: rgba(201,144,138,0.9);
            margin-bottom: 20px;
        }
        .vote-question {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            font-weight: 600;
            color: rgba(255,255,255,0.92);
            text-align: center;
            line-height: 1.25;
            margin-bottom: 44px;
            max-width: 90vw;
        }
        .vote-question em {
            font-style: italic;
            color: rgba(201,144,138,0.75);
            font-weight: 400;
        }
        .vote-row {
            display: flex;
            align-items: center;
            gap: 44px;
            max-width: 92vw;
        }
        .vote-row-photo, .vote-row-photo-ph {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(201,144,138,0.55);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .vote-row-photo-ph {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
        }
        .vote-quote {
            display: flex;
            flex-direction: column;
            text-align: left;
            min-width: 0;
        }
        .vote-quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 2.8rem;
            color: #f2dbd4;
            line-height: 1.2;
            font-weight: 500;
            word-break: break-word;
        }
        .vote-quote-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            margin-top: 16px;
            letter-spacing: 0.04em;
        }
        @media (max-width: 700px) {
            .vote-question { font-size: 1.6rem; margin-bottom: 28px; }
            .vote-row { flex-direction: column; gap: 18px; }
            .vote-row-photo, .vote-row-photo-ph { width: 110px; height: 110px; }
            .vote-row-photo-ph { font-size: 2.4rem; }
            .vote-quote { text-align: center; }
            .vote-quote-text { font-size: 1.9rem; }
        }
        .slide-photo-large {
            max-width: 78vw;
            max-height: 58vh;
            border-radius: 16px;
            object-fit: contain;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            margin-bottom: 22px;
        }

        /* Multi-person layout — used for first-timers (2-3 per slide) and
           small church welcome slides. */
        .person-row {
            display: flex;
            gap: 44px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 26px;
            max-width: 95vw;
        }
        .person-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 220px;
        }
        .person-card-photo, .person-card-photo-ph {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(201,144,138,0.55);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            background: rgba(255,255,255,0.08);
        }
        .person-card-photo-ph {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 3.4rem;
            color: rgba(255,255,255,0.75);
            font-weight: 600;
        }
        .person-card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: white;
            font-weight: 600;
            text-align: center;
            line-height: 1.15;
        }
        .person-card-meta {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.55);
            font-style: italic;
            text-align: center;
        }
        @media (max-width: 700px) {
            .person-row { gap: 22px; }
            .person-card-photo, .person-card-photo-ph { width: 105px; height: 105px; }
            .person-card-photo-ph { font-size: 2.4rem; }
            .person-card-name { font-size: 1.15rem; }
        }

        /* Small-thumbnail grid — used on church welcome slides so every
           woman from a church fits on a single slide. */
        .person-grid-small {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px 28px;
            max-width: 92vw;
            margin-top: 20px;
        }
        .person-mini {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100px;
        }
        .person-mini-photo, .person-mini-photo-ph {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(201,144,138,0.5);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 4px 18px rgba(0,0,0,0.3);
        }
        .person-mini-photo-ph {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
        }
        .person-mini-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            text-align: center;
            line-height: 1.15;
        }
        @media (max-width: 700px) {
            .person-grid-small { gap: 14px 18px; }
            .person-mini { width: 76px; }
            .person-mini-photo, .person-mini-photo-ph { width: 62px; height: 62px; }
            .person-mini-photo-ph { font-size: 1.3rem; }
            .person-mini-name { font-size: 0.82rem; }
        }

        .name-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 20px;
            max-width: 90vw;
            margin-top: 8px;
        }
        .name-pill {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            padding: 8px 18px;
            border-radius: 24px;
            background: rgba(201,144,138,0.18);
            border: 1px solid rgba(201,144,138,0.4);
        }

        .wyr-options {
            display: flex;
            gap: 30px;
            margin: 18px 0 8px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 92vw;
        }
        .wyr-option {
            flex: 1 1 280px;
            min-width: 260px;
            max-width: 380px;
            padding: 22px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,255,255,0.15);
        }
        .wyr-option-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.95);
        }
        .wyr-option-pct {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: rgba(201,144,138,0.85);
            margin-bottom: 10px;
        }
        .wyr-voters {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.7);
            font-style: italic;
            line-height: 1.4;
        }
        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem;
            color: rgba(201,144,138,0.7);
        }

        .leaderboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            min-width: 320px;
        }
        .leaderboard-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 18px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            gap: 30px;
        }
        .leaderboard-rank {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: rgba(201,144,138,0.85);
            min-width: 30px;
        }
        .leaderboard-name { flex: 1; text-align: left; color: white; }
        .leaderboard-score { font-family: 'Playfair Display', serif; font-weight: 700; color: white; }

        .quote-mark {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            color: rgba(201,144,138,0.4);
            line-height: 0.5;
            margin-bottom: 6px;
        }

        /* Chrome auto-hide — everything with .presenter-chrome fades out
           after a few seconds of no mouse/key activity so the audience sees
           a clean slideshow. Moving the mouse or pressing a key brings it
           back. */
        .presenter-chrome {
            transition: opacity 0.5s ease;
        }
        body.chrome-hidden .presenter-chrome {
            opacity: 0;
            pointer-events: none;
        }
        body.chrome-hidden { cursor: none; }

        /* Counter + Up Next + Controls */
        .slide-counter {
            position: fixed;
            top: 16px;
            right: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            z-index: 50;
            font-family: 'Cormorant Garamond', serif;
        }
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            z-index: 50;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.2); }
        .ctrl-btn.skip { background: rgba(201,144,138,0.22); border-color: rgba(201,144,138,0.45); }
        .ctrl-btn.skip:hover { background: rgba(201,144,138,0.38); }

        .keyhint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.78rem;
            color: rgba(255,255,255,0.35);
            font-family: 'Cormorant Garamond', serif;
            z-index: 49;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .slide-title { font-size: 1.9rem; }
            .slide-body { font-size: 1.2rem; }
            .name-pill { font-size: 1.1rem; padding: 6px 14px; }
            .wyr-options { gap: 14px; }
        }
    </style>
</head>
<body>

<!-- Start Screen -->
<div class="start-screen" id="start-screen">
    <div class="start-icon">✨</div>
    <div class="start-title">G4 2026 Retreat Slideshow</div>
    <div class="start-subtitle">A welcome loop for the morning gathering</div>
    <div class="start-count" id="start-count">Loading content…</div>

    <div class="filter-section">
        <div class="filter-section-label">Categories to include</div>
        <div class="filter-hint">All categories are on by default. Tap a category to exclude it. A dashed, crossed-out pill means it's excluded.</div>
        <div class="filter-quick">
            <button type="button" class="filter-quick-btn" onclick="setAllCategories(true)">Include all</button>
            <button type="button" class="filter-quick-btn" onclick="setAllCategories(false)">Exclude all</button>
        </div>
        <div class="filter-row" id="category-filters"></div>
    </div>

    <div class="speed-row">
        <span class="speed-label">Seconds per slide:</span>
        <input type="number" class="speed-input" id="speed-input" value="8" min="3" max="60">
    </div>

    <button class="start-btn" id="start-btn" onclick="startSlideshow()" disabled style="opacity:0.6;cursor:wait;">Loading content…</button>
    <div class="start-error" id="start-error"></div>
</div>

<!-- Slideshow -->
<div id="slideshow" style="display:none;">
    <div class="slide-counter presenter-chrome" id="slide-counter"></div>
    <div id="slides-container"></div>
    <div class="keyhint presenter-chrome">← back · space next · P pause · H hide chrome · Esc exit</div>
    <div class="controls presenter-chrome">
        <button class="ctrl-btn" onclick="prevSlide()">◀ Back</button>
        <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">Pause</button>
        <button class="ctrl-btn" onclick="nextSlide()">Next ▶</button>
        <button class="ctrl-btn" onclick="exitSlideshow()">Exit</button>
    </div>
</div>

<script>
    const API_URL = 'https://g4-retreat-api.brieyasmom.workers.dev';

    // Categories the user can toggle on/off from the start screen
    const CATEGORIES = [
        { key: 'welcome',     label: 'Welcome',         default: true  },
        { key: 'firsttimers', label: 'First-Timers',    default: true  },
        { key: 'church',      label: 'By Church',       default: true  },
        { key: 'team',        label: 'Meet the Team',   default: true  },
        { key: 'speakers',    label: 'Speakers',        default: true  },
        { key: 'worship',     label: 'Worship Team',    default: true  },
        { key: 'profile',     label: 'Meet Everyone',   default: true  },
        { key: 'wyr',         label: 'Would You Rather',default: true  },
        { key: 'poll',        label: 'Polls',           default: true  },
        { key: 'encouragement', label: 'Encouragement', default: true  },
        { key: 'moment',      label: 'Photo Moments',   default: true  },
        { key: 'funfact',     label: 'Fun Facts',       default: true  },
        { key: 'packing',     label: 'Packing Scores',  default: true  }
    ];

    let activeCategories = new Set(CATEGORIES.filter(c => c.default).map(c => c.key));
    let allSlides = [];     // queue of slide objects (after shuffle)
    let currentIndex = 0;
    let timer = null;
    let paused = false;

    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str == null ? '' : String(str);
        return d.innerHTML;
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function buildCategoryFilters() {
        const row = document.getElementById('category-filters');
        row.innerHTML = '';
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.dataset.catKey = cat.key;
            btn.className = 'filter-btn' + (activeCategories.has(cat.key) ? ' active' : '');
            btn.textContent = cat.label;
            btn.onclick = () => {
                if (activeCategories.has(cat.key)) {
                    activeCategories.delete(cat.key);
                    btn.classList.remove('active');
                } else {
                    activeCategories.add(cat.key);
                    btn.classList.add('active');
                }
            };
            row.appendChild(btn);
        });
    }

    function setAllCategories(on) {
        document.querySelectorAll('#category-filters .filter-btn').forEach(btn => {
            const key = btn.dataset.catKey;
            if (on) {
                activeCategories.add(key);
                btn.classList.add('active');
            } else {
                activeCategories.delete(key);
                btn.classList.remove('active');
            }
        });
    }

    // ---- Data fetching (graceful — any failure just yields empty) ----
    async function safeFetch(path) {
        try {
            const res = await fetch(API_URL + path);
            if (!res.ok) return null;
            return await res.json();
        } catch (e) { return null; }
    }

    async function loadAll() {
        const [users, wyr, polls, messages, moments, funfacts, packing, announcement] = await Promise.all([
            safeFetch('/api/users/directory'),
            safeFetch('/api/games/wyr/feed'),
            safeFetch('/api/polls/feed'),
            safeFetch('/api/messages'),
            safeFetch('/api/moments'),
            safeFetch('/api/games/funfacts'),
            safeFetch('/api/games/packing'),
            safeFetch('/api/announcements/active')
        ]);
        return {
            users: users || [],
            wyr: wyr || [],
            polls: polls || [],
            messages: messages || [],
            moments: moments || [],
            funfacts: funfacts || [],
            packing: packing || [],
            announcement: announcement || null
        };
    }

    // ---- First-time detection (best-effort heuristic) ----
    function isFirstTimer(u) {
        if (!u) return false;
        const ry = (u.retreat_years || '').trim().toLowerCase();
        if (!ry) return true;                    // empty = unknown, treat as first-time
        if (/first|1st/.test(ry)) return true;
        if (/^2026$/.test(ry)) return true;      // only this retreat listed
        return false;
    }

    function fullName(u) {
        const last = (u.last_name && u.last_name.length > 1) ? (' ' + u.last_name) : (u.last_initial ? (' ' + u.last_initial + '.') : '');
        return (u.first_name || '') + last;
    }

    // Build a name→user lookup so we can attach profile photos to vote /
    // response / message slides. Votes and poll responses reference women by
    // display name (e.g. "Janet S." or "Janet Smith"), which we need to match
    // back to users in the directory. We index every plausible variant so a
    // single lookup hits regardless of source.
    function buildUserIndex(users) {
        const idx = {};
        const put = (k, u) => { if (k && !idx[k]) idx[k] = u; };
        (users || []).forEach(u => {
            const first = (u.first_name || '').trim();
            if (!first) return;
            const initial = (u.last_initial || '').trim();
            const lastFull = (u.last_name || '').trim();
            put(first.toLowerCase(), u);
            if (initial) {
                put((first + ' ' + initial).toLowerCase(), u);
                put((first + ' ' + initial + '.').toLowerCase(), u);
            }
            if (lastFull) {
                put((first + ' ' + lastFull).toLowerCase(), u);
                put((first + ' ' + lastFull[0]).toLowerCase(), u);
                put((first + ' ' + lastFull[0] + '.').toLowerCase(), u);
            }
        });
        return idx;
    }
    function findUser(idx, name) {
        if (!idx || !name) return null;
        return idx[String(name).trim().toLowerCase()] || null;
    }
    function photoTag(user, cls) {
        if (user && user.photo_data) {
            return `<img class="${cls || 'slide-photo'}" src="${user.photo_data}" alt="">`;
        }
        return '';
    }
    // 150px circular photo for the left side of vote/poll slides.
    // Falls back to a circle with the first letter of the display name.
    function rowPhoto(user, displayName) {
        if (user && user.photo_data) {
            return `<img class="vote-row-photo" src="${user.photo_data}" alt="">`;
        }
        const initial = (displayName || '?').trim().charAt(0).toUpperCase();
        return `<div class="vote-row-photo-ph">${escHtml(initial)}</div>`;
    }

    // A card with a medium circular photo (or initial placeholder), name,
    // and optional sub-line. Used by first-timer slides.
    function personCard(u, meta) {
        const photo = u.photo_data
            ? `<img class="person-card-photo" src="${u.photo_data}" alt="">`
            : `<div class="person-card-photo-ph">${escHtml((u.first_name || '?').charAt(0).toUpperCase())}</div>`;
        return `
            <div class="person-card">
                ${photo}
                <div class="person-card-name">${escHtml(fullName(u))}</div>
                ${meta ? `<div class="person-card-meta">${escHtml(meta)}</div>` : ''}
            </div>
        `;
    }
    // Small thumbnail with first name + last initial — used to fit every
    // woman from a church on a single slide.
    function personMini(u) {
        const photo = u.photo_data
            ? `<img class="person-mini-photo" src="${u.photo_data}" alt="">`
            : `<div class="person-mini-photo-ph">${escHtml((u.first_name || '?').charAt(0).toUpperCase())}</div>`;
        return `
            <div class="person-mini">
                ${photo}
                <div class="person-mini-name">${escHtml(fullName(u))}</div>
            </div>
        `;
    }
    function chunkArray(arr, size) {
        const out = [];
        for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
        return out;
    }

    // Static welcome/scripture slides — used both for the "welcome" category
    // and as a guaranteed fallback if every data source is empty.
    const STATIC_WELCOME_SLIDES = [
        {
            type: 'welcome',
            summary: 'Welcome, Sisters',
            html: `
                <div class="slide-kicker">G4 Women's Retreat</div>
                <div class="slide-title">Welcome, Sisters</div>
                <div class="slide-subtitle">"Every good and perfect gift is from above" — James 1:17</div>
                <div class="slide-body">So glad you're here. Settle in, grab some coffee, and look around at these beautiful faces.</div>
            `
        },
        {
            type: 'welcome',
            summary: 'Scripture — James 1:17',
            html: `
                <div class="slide-kicker">Scripture</div>
                <div class="slide-title">Every Good &amp; Perfect Gift</div>
                <div class="slide-body" style="font-style:italic;">"Every good and perfect gift is from above, coming down from the Father of the heavenly lights, who does not change like shifting shadows."</div>
                <div class="slide-attribution">James 1:17</div>
            `
        },
        {
            type: 'welcome',
            summary: 'Good morning',
            html: `
                <div class="slide-kicker">Good Morning</div>
                <div class="slide-title">Grab a cup of coffee</div>
                <div class="slide-subtitle">Find a friend · Find a seat · Take a deep breath</div>
                <div class="slide-body">Today is a gift. We're so glad you're here.</div>
            `
        },
        {
            type: 'welcome',
            summary: 'G4 2026',
            html: `
                <div class="slide-kicker">G4 2026</div>
                <div class="slide-title">Incredible Gifts</div>
                <div class="slide-subtitle">A weekend of worship, laughter, and sisterhood</div>
            `
        }
    ];

    // ---- Slide builders ----
    function makeSlides(data) {
        const slides = [];
        const userIndex = buildUserIndex(data.users);

        // Welcome slides (always 4 static ones when the welcome category is on)
        if (activeCategories.has('welcome')) {
            STATIC_WELCOME_SLIDES.forEach(s => slides.push(s));
        }

        // Active announcement
        if (activeCategories.has('welcome') && data.announcement && data.announcement.message) {
            slides.push({
                type: 'announcement',
                summary: 'Announcement',
                html: `
                    <div class="slide-kicker">Announcement</div>
                    <div class="slide-title">${escHtml(data.announcement.message)}</div>
                `
            });
        }

        // First-timers — chunked into groups of 3 per slide so the names
        // and faces actually get attention, instead of a long wall of pills.
        if (activeCategories.has('firsttimers')) {
            const firsts = data.users.filter(isFirstTimer);
            const groups = chunkArray(firsts, 3);
            groups.forEach((group, gi) => {
                slides.push({
                    type: 'firsttimers',
                    summary: `First-timers: ${group.map(fullName).join(', ')}`,
                    html: `
                        <div class="slide-kicker">A warm welcome to</div>
                        <div class="slide-title" style="font-size:2rem;margin-bottom:6px;">Some of Our First-Time G4 Girls</div>
                        <div class="slide-subtitle">We are so glad you're here this year</div>
                        <div class="person-row">
                            ${group.map(u => personCard(u, u.church || u.location || '')).join('')}
                        </div>
                    `
                });
            });
        }

        // By church — one "Welcome {church}" slide per church, showing
        // every woman from that church as a small thumbnail with her name.
        if (activeCategories.has('church')) {
            const byChurch = {};
            data.users.forEach(u => {
                const church = (u.church || '').trim();
                if (!church) return;
                const key = church.toLowerCase();
                if (!byChurch[key]) byChurch[key] = { name: church, users: [] };
                byChurch[key].users.push(u);
            });
            Object.values(byChurch).forEach(group => {
                slides.push({
                    type: 'church',
                    summary: `Welcome ${group.name} (${group.users.length})`,
                    html: `
                        <div class="slide-kicker">Welcome</div>
                        <div class="slide-title" style="color:#e6b5ac;font-size:2.6rem;">${escHtml(group.name)}</div>
                        <div class="slide-subtitle">${group.users.length === 1 ? 'Our sister with us this year' : `${group.users.length} sisters with us this year`}</div>
                        <div class="person-grid-small">
                            ${group.users.map(personMini).join('')}
                        </div>
                    `
                });
            });
        }

        // Meet the team
        if (activeCategories.has('team')) {
            const team = data.users.filter(u => u.is_team);
            if (team.length) {
                slides.push({
                    type: 'team',
                    summary: `Meet the Team (${team.length})`,
                    html: `
                        <div class="slide-kicker">Behind the scenes</div>
                        <div class="slide-title">Meet the Team</div>
                        <div class="slide-subtitle">The women making this weekend happen</div>
                        <div class="name-grid">
                            ${team.map(u => `<div class="name-pill">${escHtml(fullName(u))}</div>`).join('')}
                        </div>
                    `
                });
            }
        }

        // Worship team
        if (activeCategories.has('worship')) {
            const worship = data.users.filter(u => u.is_worship);
            if (worship.length) {
                slides.push({
                    type: 'worship',
                    summary: `Worship Team (${worship.length})`,
                    html: `
                        <div class="slide-kicker">Leading us in song</div>
                        <div class="slide-title">The Worship Team</div>
                        <div class="slide-subtitle">"Sing to the Lord a new song"</div>
                        <div class="name-grid">
                            ${worship.map(u => `<div class="name-pill">${escHtml(fullName(u))}</div>`).join('')}
                        </div>
                    `
                });
            }
        }

        // Speakers
        if (activeCategories.has('speakers')) {
            const speakers = data.users.filter(u => u.is_speaker);
            speakers.forEach(s => {
                slides.push({
                    type: 'speakers',
                    summary: `Speaker: ${fullName(s)}`,
                    html: `
                        <div class="slide-kicker">Speaker</div>
                        ${s.photo_data ? `<img class="slide-photo" src="${s.photo_data}" alt="">` : ''}
                        <div class="slide-title">${escHtml(fullName(s))}</div>
                        ${s.church ? `<div class="slide-subtitle">${escHtml(s.church)}</div>` : ''}
                        ${s.about ? `<div class="slide-body">${escHtml(s.about)}</div>` : ''}
                    `
                });
            });
        }

        // Individual profile spotlights — random sample
        if (activeCategories.has('profile')) {
            const withPhoto = data.users.filter(u => u.photo_data && !u.is_speaker);
            withPhoto.forEach(u => {
                const bits = [];
                if (u.location) bits.push(u.location);
                if (u.church)   bits.push(u.church);
                slides.push({
                    type: 'profile',
                    summary: `Spotlight: ${fullName(u)}`,
                    html: `
                        <div class="slide-kicker">A G4 Sister</div>
                        <img class="slide-photo" src="${u.photo_data}" alt="">
                        <div class="slide-title">${escHtml(fullName(u))}</div>
                        ${bits.length ? `<div class="slide-subtitle">${escHtml(bits.join(' · '))}</div>` : ''}
                        ${u.about ? `<div class="slide-body">"${escHtml(u.about)}"</div>` : ''}
                    `
                });
            });
        }

        // Would You Rather — one slide per person per vote.
        // Layout: kicker · question big at top · [photo | "choice" — name]
        if (activeCategories.has('wyr')) {
            data.wyr.forEach(q => {
                const makeVoterSlide = (voterName, choiceText) => {
                    const user = findUser(userIndex, voterName);
                    slides.push({
                        type: 'wyr',
                        summary: `WYR: ${voterName} chose ${choiceText}`,
                        html: `
                            <div class="vote-kicker">Would You Rather</div>
                            <div class="vote-question">${escHtml(q.option_a)} <em>or</em> ${escHtml(q.option_b)}?</div>
                            <div class="vote-row">
                                ${rowPhoto(user, voterName)}
                                <div class="vote-quote">
                                    <div class="vote-quote-text">&ldquo;${escHtml(choiceText)}&rdquo;</div>
                                    <div class="vote-quote-name">— ${escHtml(voterName)}</div>
                                </div>
                            </div>
                        `
                    });
                };
                (q.voters_a || []).forEach(v => makeVoterSlide(v, q.option_a));
                (q.voters_b || []).forEach(v => makeVoterSlide(v, q.option_b));
            });
        }

        // Polls — one slide per person per response.
        // Same layout as WYR: kicker · question · [photo | "answer" — name]
        if (activeCategories.has('poll')) {
            data.polls.forEach(p => {
                (p.responses || []).forEach(r => {
                    const voterName = r.user_name || 'Anonymous';
                    const user = findUser(userIndex, voterName);
                    slides.push({
                        type: 'poll',
                        summary: `Poll: ${voterName} on "${p.question}"`,
                        html: `
                            <div class="vote-kicker">Poll</div>
                            <div class="vote-question">${escHtml(p.question)}</div>
                            <div class="vote-row">
                                ${rowPhoto(user, voterName)}
                                <div class="vote-quote">
                                    <div class="vote-quote-text">&ldquo;${escHtml(r.response)}&rdquo;</div>
                                    <div class="vote-quote-name">— ${escHtml(voterName)}</div>
                                </div>
                            </div>
                        `
                    });
                });
            });
        }

        // Encouragement messages (NOT prayer requests)
        if (activeCategories.has('encouragement')) {
            const encouragements = data.messages.filter(m => m.type === 'encouragement');
            encouragements.forEach(m => {
                const tagged = m.tagged_name ? ` to ${m.tagged_name}` : '';
                const user = findUser(userIndex, m.author_name);
                slides.push({
                    type: 'encouragement',
                    summary: `Encouragement from ${m.author_name}${tagged}`,
                    html: `
                        <div class="slide-kicker">Encouragement${m.tagged_name ? ' for ' + escHtml(m.tagged_name) : ''}</div>
                        ${photoTag(user)}
                        <div class="quote-mark">"</div>
                        <div class="slide-body">${escHtml(m.message)}</div>
                        <div class="slide-attribution">— ${escHtml(m.author_name || 'Anonymous')}</div>
                    `
                });
            });
        }

        // Photo moments
        if (activeCategories.has('moment')) {
            data.moments.filter(m => m.photo_data).forEach(m => {
                slides.push({
                    type: 'moment',
                    summary: `Photo from ${m.author_name || 'a sister'}${m.caption ? ' — ' + m.caption.slice(0, 40) : ''}`,
                    html: `
                        <div class="slide-kicker">A Moment</div>
                        <img class="slide-photo-large" src="${m.photo_data}" alt="">
                        ${m.caption ? `<div class="slide-subtitle">"${escHtml(m.caption)}"</div>` : ''}
                        <div class="slide-attribution">— ${escHtml(m.author_name || 'Anonymous')}</div>
                    `
                });
            });
        }

        // Fun facts
        if (activeCategories.has('funfact')) {
            data.funfacts.forEach(f => {
                const user = findUser(userIndex, f.author_name);
                slides.push({
                    type: 'funfact',
                    summary: `Fun fact from ${f.author_name}`,
                    html: `
                        <div class="slide-kicker">Did you know?</div>
                        ${photoTag(user)}
                        <div class="slide-title" style="font-size:2rem;">A fun fact about ${escHtml(f.author_name || 'one of us')}</div>
                        <div class="slide-body" style="margin-top:14px;">${escHtml(f.fact)}</div>
                    `
                });
            });
        }

        // Packing leaderboard
        if (activeCategories.has('packing') && data.packing.length) {
            const top = data.packing.slice(0, 10);
            slides.push({
                type: 'packing',
                summary: `Packing Game Leaderboard (top ${top.length})`,
                html: `
                    <div class="slide-kicker">Packing Game</div>
                    <div class="slide-title">Top Packers</div>
                    <div class="leaderboard">
                        ${top.map((p, i) => `
                            <div class="leaderboard-row">
                                <div class="leaderboard-rank">${i + 1}</div>
                                <div class="leaderboard-name">${escHtml(p.author_name || 'Anonymous')}</div>
                                <div class="leaderboard-score">${p.score}</div>
                            </div>
                        `).join('')}
                    </div>
                `
            });
        }

        return shuffle(slides);
    }

    // ---- Slideshow rendering ----
    function renderSlide(slide) {
        const el = document.createElement('div');
        el.className = 'slide';
        el.innerHTML = slide.html;
        return el;
    }

    function showSlideAt(index) {
        const container = document.getElementById('slides-container');
        // remove old slides (we render lazily — only the active one + neighbors live in DOM)
        container.innerHTML = '';
        if (!allSlides.length) return;
        index = ((index % allSlides.length) + allSlides.length) % allSlides.length;
        currentIndex = index;
        const node = renderSlide(allSlides[index]);
        node.classList.add('active');
        container.appendChild(node);

        document.getElementById('slide-counter').textContent = (index + 1) + ' / ' + allSlides.length;
    }

    function nextSlide() {
        if (!allSlides.length) return;
        showSlideAt(currentIndex + 1);
        if (!paused) restartTimer();
    }

    function prevSlide() {
        if (!allSlides.length) return;
        showSlideAt(currentIndex - 1);
        if (!paused) restartTimer();
    }

    function getSpeed() {
        return (parseInt(document.getElementById('speed-input').value) || 8) * 1000;
    }

    function startTimer() { timer = setInterval(nextSlide, getSpeed()); }
    function stopTimer() { if (timer) clearInterval(timer); timer = null; }
    function restartTimer() { stopTimer(); startTimer(); }

    function togglePause() {
        paused = !paused;
        document.getElementById('pause-btn').textContent = paused ? 'Play' : 'Pause';
        if (paused) stopTimer(); else startTimer();
    }

    function exitSlideshow() {
        stopTimer();
        document.body.classList.remove('chrome-hidden');
        if (chromeHideTimer) clearTimeout(chromeHideTimer);
        chromeManuallyHidden = false;
        document.getElementById('slideshow').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    async function startSlideshow() {
        const errEl = document.getElementById('start-error');
        errEl.textContent = '';
        if (!activeCategories.size) {
            errEl.textContent = 'Pick at least one category to include.';
            return;
        }
        // If data is still loading, use an empty dataset — welcome fallback slides still work.
        const data = window.__retreatData || {
            users: [], wyr: [], polls: [], messages: [],
            moments: [], funfacts: [], packing: [], announcement: null
        };
        try {
            allSlides = makeSlides(data);
        } catch (e) {
            console.error('makeSlides error:', e);
            errEl.textContent = 'Error building slides: ' + (e && e.message ? e.message : e);
            return;
        }
        // Guaranteed fallback — if somehow nothing produced slides, show the welcome set.
        if (!allSlides.length) {
            allSlides = shuffle([...STATIC_WELCOME_SLIDES]);
        }
        if (!allSlides.length) {
            errEl.textContent = 'No slides to show. Try enabling "Welcome" at the top.';
            return;
        }
        currentIndex = 0;
        paused = false;
        document.getElementById('pause-btn').textContent = 'Pause';
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('slideshow').style.display = 'block';
        chromeManuallyHidden = false;
        document.body.classList.remove('chrome-hidden');
        showSlideAt(0);
        startTimer();
        showChrome(); // starts the idle-hide timer
    }

    // ---- Init ----
    async function init() {
        buildCategoryFilters();
        const startBtn = document.getElementById('start-btn');
        const errEl = document.getElementById('start-error');
        let data;
        try {
            data = await loadAll();
        } catch (e) {
            console.error('loadAll error:', e);
            errEl.textContent = 'Could not load content: ' + (e && e.message ? e.message : e) + ' — you can still start with welcome slides.';
            data = { users: [], wyr: [], polls: [], messages: [], moments: [], funfacts: [], packing: [], announcement: null };
        }
        window.__retreatData = data;
        const encourageCount = (data.messages || []).filter(m => m.type === 'encouragement').length;
        const counts = [
            (data.users || []).length + ' women',
            (data.wyr || []).length + ' would-you-rathers',
            (data.polls || []).length + ' polls',
            encourageCount + ' encouragements',
            (data.moments || []).length + ' photos',
            (data.funfacts || []).length + ' fun facts'
        ];
        document.getElementById('start-count').textContent = counts.join(' · ');
        startBtn.disabled = false;
        startBtn.style.opacity = '1';
        startBtn.style.cursor = 'pointer';
        startBtn.textContent = 'Start Slideshow';
    }

    // ---- Chrome auto-hide (so the audience doesn't see Up Next / controls) ----
    let chromeHideTimer = null;
    let chromeManuallyHidden = false;
    const CHROME_IDLE_MS = 3500;

    function showChrome() {
        if (chromeManuallyHidden) return;
        document.body.classList.remove('chrome-hidden');
        if (chromeHideTimer) clearTimeout(chromeHideTimer);
        chromeHideTimer = setTimeout(() => {
            if (document.getElementById('slideshow').style.display !== 'none') {
                document.body.classList.add('chrome-hidden');
            }
        }, CHROME_IDLE_MS);
    }
    function toggleChromeHidden() {
        chromeManuallyHidden = !chromeManuallyHidden;
        if (chromeManuallyHidden) {
            document.body.classList.add('chrome-hidden');
            if (chromeHideTimer) clearTimeout(chromeHideTimer);
        } else {
            document.body.classList.remove('chrome-hidden');
            showChrome();
        }
    }
    document.addEventListener('mousemove', showChrome);
    document.addEventListener('touchstart', showChrome);

    // Keyboard controls
    document.addEventListener('keydown', e => {
        if (document.getElementById('slideshow').style.display === 'none') return;
        showChrome();
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        else if (e.key === 'p' || e.key === 'P') togglePause();
        else if (e.key === 'h' || e.key === 'H') toggleChromeHidden();
        else if (e.key === 'Escape') exitSlideshow();
    });

    init();
</script>
</body>
</html>
