<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f7f0eb">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>What Do You Meme? - G4 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Cormorant+Garamond:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --cream: #f7f0eb;
            --taupe: #7a6b63;
            --sage: #8a9e7a;
            --blush: #c9908a;
            --warm-grey: #c8b9b0;
            --dark-text: #4a3728;
            --light-text: #8a7b72;
            --accent: #b87a6e;
            --rose: #d4a59a;
            --shadow-sm: 0 2px 8px rgba(74, 55, 40, 0.06);
            --shadow-md: 0 4px 16px rgba(74, 55, 40, 0.08);
            --shadow-lg: 0 12px 32px rgba(74, 55, 40, 0.1);
        }

        html, body {
            width: 100%; min-height: 100vh;
            overscroll-behavior: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif;
            background: var(--cream);
            color: var(--dark-text);
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px 100px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--warm-grey);
            margin-bottom: 20px;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark-text);
        }
        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Login gate */
        .login-gate {
            text-align: center;
            padding: 60px 20px;
        }
        .login-gate p {
            color: var(--light-text);
            margin-bottom: 16px;
        }
        .login-gate a {
            color: var(--accent);
            font-weight: 600;
        }

        /* Meme image */
        .meme-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
        }
        .meme-card img {
            width: 100%;
            display: block;
        }
        .meme-title {
            padding: 12px 16px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            color: var(--dark-text);
        }

        /* Caption form */
        .caption-form {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }
        .caption-form label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--dark-text);
            font-size: 0.95rem;
        }
        .caption-form .input-row {
            display: flex;
            gap: 8px;
        }
        .caption-form input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid var(--warm-grey);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--cream);
            color: var(--dark-text);
            outline: none;
            transition: border-color 0.2s;
        }
        .caption-form input:focus {
            border-color: var(--accent);
        }
        .caption-form button {
            padding: 10px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .caption-form button:active { opacity: 0.8; }
        .caption-form .hint {
            font-size: 0.8rem;
            color: var(--light-text);
            margin-top: 6px;
        }
        .caption-form .my-caption {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(184, 122, 110, 0.08);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* Section labels */
        .section-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-text);
            margin-bottom: 12px;
        }

        /* Captions list */
        .captions-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .caption-item {
            background: #fff;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.15s;
        }
        .caption-item.voted {
            background: rgba(184, 122, 110, 0.06);
            border: 1.5px solid var(--rose);
        }
        .caption-item.mine {
            border-left: 3px solid var(--sage);
        }
        .caption-text {
            flex: 1;
        }
        .caption-text .text {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.3;
            color: var(--dark-text);
        }
        .caption-text .author {
            font-size: 0.8rem;
            color: var(--light-text);
            margin-top: 2px;
        }
        .vote-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 12px;
            border: 1.5px solid var(--warm-grey);
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 52px;
        }
        .vote-btn .heart {
            font-size: 1.3rem;
            transition: transform 0.2s;
        }
        .vote-btn .count {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--light-text);
        }
        .vote-btn.voted {
            border-color: var(--accent);
            background: rgba(184, 122, 110, 0.08);
        }
        .vote-btn.voted .heart {
            transform: scale(1.15);
        }
        .vote-btn.voted .count {
            color: var(--accent);
        }
        .vote-btn:active {
            transform: scale(0.95);
        }
        .vote-btn.own-caption {
            opacity: 0.4;
            cursor: default;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--light-text);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .empty-state p { font-size: 0.95rem; }

        /* No round */
        .no-round {
            text-align: center;
            padding: 80px 20px;
        }
        .no-round .icon { font-size: 3rem; margin-bottom: 12px; }
        .no-round h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .no-round p { color: var(--light-text); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark-text);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            max-width: 90vw;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Voting badge */
        .voting-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .voting-badge.open { background: rgba(138, 158, 122, 0.15); color: var(--sage); }
        .voting-badge.closed { background: rgba(200, 185, 176, 0.3); color: var(--taupe); }

        /* Winner highlight */
        .caption-item.winner {
            background: linear-gradient(135deg, rgba(184, 122, 110, 0.08), rgba(212, 165, 154, 0.12));
            border: 1.5px solid var(--rose);
            position: relative;
        }
        .winner-badge {
            position: absolute;
            top: -8px;
            right: 12px;
            background: var(--accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Refresh btn */
        .refresh-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.3s;
        }
        .refresh-btn.spinning {
            animation: spin 0.6s ease;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Rank numbers */
        .rank {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--warm-grey);
            min-width: 24px;
            text-align: center;
        }
        .caption-item:first-child .rank { color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="index.html" class="back-link">Back</a>
            <h1>What Do You Meme?</h1>
            <button class="refresh-btn" onclick="loadRound()">&#x21bb;</button>
        </div>

        <div id="login-gate" class="login-gate" style="display:none;">
            <p>Sign in on the main app first to play!</p>
            <a href="index.html">Go to app</a>
        </div>

        <div id="content" style="display:none;">
            <!-- No active round -->
            <div id="no-round" class="no-round" style="display:none;">
                <div class="icon">&#x1f5bc;</div>
                <h2>No Meme Yet!</h2>
                <p>Check back soon - a new meme image will be posted for captioning!</p>
            </div>

            <!-- Active round -->
            <div id="active-round" style="display:none;">
                <div class="meme-card">
                    <img id="meme-image" src="" alt="Meme image">
                    <div id="meme-title" class="meme-title" style="display:none;"></div>
                </div>

                <!-- Caption submission -->
                <div id="caption-form-section" class="caption-form">
                    <label>Write your caption:</label>
                    <div class="input-row">
                        <input type="text" id="caption-input" placeholder="Your funniest caption..." maxlength="200">
                        <button onclick="submitCaption()">Send</button>
                    </div>
                    <div class="hint">One caption per round. You can update it anytime.</div>
                    <div id="my-caption-display" class="my-caption" style="display:none;"></div>
                </div>

                <!-- Voting status -->
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
                    <div class="section-label">Captions</div>
                    <div id="voting-badge" class="voting-badge"></div>
                </div>

                <!-- Captions list -->
                <div id="captions-list" class="captions-list"></div>
                <div id="empty-captions" class="empty-state" style="display:none;">
                    <div class="icon">&#x1f4ad;</div>
                    <p>No captions yet. Be the first!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'https://g4-retreat-api.brieyasmom.workers.dev';
        let currentUser = null;
        let currentRound = null;
        let myVotes = [];

        function init() {
            const saved = localStorage.getItem('g4user');
            if (saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                loadRound();
                // Auto-refresh every 15 seconds
                setInterval(loadRound, 15000);
            } else {
                document.getElementById('login-gate').style.display = 'block';
                document.getElementById('content').style.display = 'none';
            }
        }

        async function loadRound() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 600);

            try {
                const userParam = currentUser ? `?user_id=${currentUser.id}` : '';
                const res = await fetch(`${API_URL}/api/meme/active${userParam}`);
                const data = await res.json();

                if (!data.active) {
                    document.getElementById('no-round').style.display = 'block';
                    document.getElementById('active-round').style.display = 'none';
                    return;
                }

                document.getElementById('no-round').style.display = 'none';
                document.getElementById('active-round').style.display = 'block';

                currentRound = data;
                myVotes = data.my_votes || [];

                // Set image
                document.getElementById('meme-image').src = data.photo_data;
                if (data.title) {
                    document.getElementById('meme-title').textContent = data.title;
                    document.getElementById('meme-title').style.display = 'block';
                } else {
                    document.getElementById('meme-title').style.display = 'none';
                }

                // Show my existing caption
                if (data.my_caption) {
                    document.getElementById('caption-input').value = data.my_caption.caption;
                    document.getElementById('my-caption-display').textContent = 'Your caption: "' + data.my_caption.caption + '"';
                    document.getElementById('my-caption-display').style.display = 'block';
                } else {
                    document.getElementById('my-caption-display').style.display = 'none';
                }

                // Voting badge
                const badge = document.getElementById('voting-badge');
                if (data.voting_open) {
                    badge.textContent = 'Voting Open';
                    badge.className = 'voting-badge open';
                } else {
                    badge.textContent = 'Voting Closed';
                    badge.className = 'voting-badge closed';
                }

                // Render captions
                renderCaptions(data.captions, data.voting_open);
            } catch (e) {
                console.error('Failed to load round:', e);
            }
        }

        function renderCaptions(captions, votingOpen) {
            const list = document.getElementById('captions-list');
            const empty = document.getElementById('empty-captions');

            if (!captions || captions.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            // Find max votes for winner highlighting
            const maxVotes = Math.max(...captions.map(c => c.vote_count));

            list.innerHTML = captions.map((c, i) => {
                const isVoted = myVotes.includes(c.id);
                const isMine = currentUser && c.user_id === currentUser.id;
                const isWinner = maxVotes > 0 && c.vote_count === maxVotes && !votingOpen;

                let classes = 'caption-item';
                if (isVoted) classes += ' voted';
                if (isMine) classes += ' mine';
                if (isWinner) classes += ' winner';

                const heartIcon = isVoted ? '&#x2764;&#xfe0f;' : '&#x1f90d;';
                const btnClass = isMine ? 'vote-btn own-caption' : (isVoted ? 'vote-btn voted' : 'vote-btn');
                const btnClick = isMine ? '' : (votingOpen ? `onclick="toggleVote(${c.id})"` : '');

                return `
                    <div class="${classes}">
                        <div class="rank">${i + 1}</div>
                        <div class="caption-text">
                            <div class="text">${escapeHtml(c.caption)}</div>
                            <div class="author">${escapeHtml(c.user_name)}</div>
                        </div>
                        <button class="${btnClass}" ${btnClick}>
                            <span class="heart">${heartIcon}</span>
                            <span class="count">${c.vote_count}</span>
                        </button>
                        ${isWinner ? '<span class="winner-badge">TOP</span>' : ''}
                    </div>
                `;
            }).join('');
        }

        async function submitCaption() {
            if (!currentUser || !currentRound) return;

            const input = document.getElementById('caption-input');
            const caption = input.value.trim();
            if (!caption) {
                showToast('Write a caption first!');
                return;
            }

            try {
                const displayName = currentUser.last_initial
                    ? `${currentUser.first_name} ${currentUser.last_initial}.`
                    : currentUser.first_name;

                const res = await fetch(`${API_URL}/api/meme/caption`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        round_id: currentRound.id,
                        user_id: currentUser.id,
                        user_name: displayName,
                        caption
                    })
                });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error);
                    return;
                }
                showToast('Caption submitted!');
                loadRound();
            } catch (e) {
                showToast('Failed to submit caption');
            }
        }

        async function toggleVote(captionId) {
            if (!currentUser) return;

            try {
                const res = await fetch(`${API_URL}/api/meme/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        caption_id: captionId
                    })
                });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error);
                    return;
                }

                // Update local state immediately for snappy UX
                if (data.voted) {
                    myVotes.push(captionId);
                } else {
                    myVotes = myVotes.filter(id => id !== captionId);
                }

                // Update vote counts in current data
                if (currentRound && currentRound.captions) {
                    const caption = currentRound.captions.find(c => c.id === captionId);
                    if (caption) {
                        caption.vote_count += data.voted ? 1 : -1;
                    }
                    // Re-sort by vote count
                    currentRound.captions.sort((a, b) => b.vote_count - a.vote_count || new Date(a.created_at) - new Date(b.created_at));
                    renderCaptions(currentRound.captions, currentRound.voting_open);
                }
            } catch (e) {
                showToast('Failed to vote');
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Enter key to submit caption
        document.getElementById('caption-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') submitCaption();
        });

        init();
    </script>
</body>
</html>
