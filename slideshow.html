<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4 2026 - Scavenger Hunt Slideshow</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #2a2320 0%, #1a1a1a 40%, #1e2a1e 100%);
            color: white;
            font-family: Cormorant Garamond, serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
            padding: 20px 20px 100px;
        }
        .slide.active { opacity: 1; }
        .slide img {
            max-width: 80vw;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .slide-info {
            text-align: center;
            max-width: 80vw;
            margin-top: 16px;
        }
        .slide-prompt {
            font-family: Playfair Display, serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        .slide-caption {
            font-size: 1.3rem;
            font-style: italic;
            color: rgba(255,255,255,0.85);
            margin-bottom: 6px;
        }
        .slide-author {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.65);
        }
        .slide-votes {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .title-slide {
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }
        .title-slide .title-icon {
            font-size: 4rem;
            margin-bottom: 8px;
        }
        .title-slide h1 {
            font-family: Playfair Display, serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .title-slide p {
            font-family: Cormorant Garamond, serif;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
            font-style: italic;
        }
        .title-slide .title-theme {
            font-family: Playfair Display, serif;
            font-size: 1.1rem;
            color: rgba(201,144,138,0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 0;
            text-align: center;
            padding: 20px;
        }
        .start-logo {
            font-size: 3.5rem;
            margin-bottom: 16px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .start-screen h1 {
            font-family: Playfair Display, serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .start-screen .subtitle {
            font-family: Cormorant Garamond, serif;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            margin-bottom: 8px;
        }
        .start-screen .theme {
            font-family: Playfair Display, serif;
            font-size: 1.1rem;
            color: rgba(201,144,138,0.8);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .start-divider {
            width: 60px;
            height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 0 auto 28px;
        }
        .start-screen .pick-label {
            font-family: Cormorant Garamond, serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
        }
        .mode-buttons {
            display: flex;
            gap: 20px;
        }
        .mode-btn {
            padding: 24px 44px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: Playfair Display, serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .mode-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(201,144,138,0.5);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        .mode-btn .icon { font-size: 2.2rem; display: block; margin-bottom: 10px; }
        .mode-btn .sub { font-family: Cormorant Garamond, serif; font-size: 0.85rem; font-weight: 400; color: rgba(255,255,255,0.4); margin-top: 6px; }
        @media (max-width: 600px) {
            .start-screen h1 { font-size: 2rem; }
            .mode-buttons { flex-direction: column; gap: 12px; }
            .mode-btn { padding: 18px 32px; }
        }
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 14px 16px;
            z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.7) 30%);
        }
        .controls button {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-family: Cormorant Garamond, serif;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .controls button:hover { background: rgba(255,255,255,0.15); }
        .controls button.active-mode { background: rgba(201,144,138,0.5); border-color: rgba(201,144,138,0.7); }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="start-screen" id="start-screen">
        <div class="start-logo">📸</div>
        <h1>Scavenger Hunt</h1>
        <div class="subtitle">G4 2026</div>
        <div class="theme">Incredible Gifts</div>
        <div class="start-divider"></div>
        <div class="pick-label">Choose a slideshow</div>
        <div class="mode-buttons">
            <button class="mode-btn" onclick="startSlideshow('all')">
                <span class="icon">🖼️</span>
                All Photos
                <div class="sub">Every submission</div>
            </button>
            <button class="mode-btn" onclick="startSlideshow('winners')">
                <span class="icon">🏆</span>
                Winners Only
                <div class="sub">Top voted per category</div>
            </button>
        </div>
    </div>
    <div class="loading" id="loading" style="display:none;">Loading photos...</div>
    <div id="slideshow"></div>
    <div class="controls" id="controls" style="display:none;">
        <button onclick="prevSlide()">← Prev</button>
        <button onclick="togglePause()" id="pause-btn">⏸ Pause</button>
        <button onclick="nextSlide()">Next →</button>
        <button id="btn-all" onclick="switchMode('all')">All Photos</button>
        <button id="btn-winners" onclick="switchMode('winners')">🏆 Winners</button>
        <button id="btn-votes" onclick="toggleVotes()">Show Votes</button>
        <button onclick="backToStart()">Exit</button>
    </div>

    <script>
        const API_URL = 'https://g4-retreat-api.brieyasmom.workers.dev';

        const PROMPTS = {
            meet1: 'Someone you\'ve never met before',
            meet2: 'Group selfie with your whole table',
            meet3: 'Someone from a different state',
            meet4: 'Someone who has been to G4 before',
            meet5: 'Someone who made you laugh today',
            meet6: 'Someone who works at the hotel',
            meet7: 'High-five a staff member',
            create1: 'Recreate a dramatic movie scene',
            create2: 'Best "retreat exhausted" face',
            create3: 'Matching outfits or swap',
            create4: 'Spell "G4" using people or objects',
            create5: 'Synchronized pose by the ocean',
            create6: 'Tiniest sandcastle ever',
            create7: 'Funniest photo you can think of',
            explore1: 'Something that reminds you of God',
            explore2: 'Favorite spot at the retreat',
            explore3: 'Something you didn\'t notice at first',
            explore4: 'A cozy corner or quiet space',
            explore5: 'Detail from the table setup or decor',
            explore6: 'Something that represents "rest"',
            beach1: 'Coolest seashell',
            beach2: 'G4 2026 in the sand',
            beach3: 'Feet in the ocean',
            beach4: 'Creative boardwalk photo',
            wild1: 'JOY in one photo'
        };

        let slides = [];
        let currentIndex = 0;
        let paused = false;
        let interval = null;
        let mode = 'all'; // 'all' or 'winners'
        let showVotes = false;

        async function loadAll() {
            const res = await fetch(API_URL + '/api/hunt/feed');
            return res.json();
        }

        async function loadWinners() {
            const res = await fetch(API_URL + '/api/hunt/winners');
            return res.json();
        }

        async function startSlideshow(selectedMode) {
            mode = selectedMode;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';

            const data = mode === 'winners' ? await loadWinners() : await loadAll();
            slides = data || [];
            // Shuffle so photos aren't grouped by person
            for (let i = slides.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [slides[i], slides[j]] = [slides[j], slides[i]];
            }

            if (slides.length === 0) {
                document.getElementById('loading').textContent = 'No photos yet!';
                return;
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            updateModeButtons();
            renderSlides();
            showSlide(0);
            startAuto();
        }

        function renderSlides() {
            const container = document.getElementById('slideshow');
            // Title slide
            let html = `<div class="slide title-slide" id="slide-0">
                <div class="title-icon">📸</div>
                <h1>Scavenger Hunt</h1>
                <p>G4 2026</p>
                <div class="title-theme">Incredible Gifts</div>
            </div>`;

            slides.forEach((s, i) => {
                const promptText = PROMPTS[s.prompt_id] || s.prompt_id;
                html += `<div class="slide" id="slide-${i + 1}">
                    <img src="${s.photo_data}" alt="">
                    <div class="slide-info">
                        <div class="slide-prompt">${promptText}</div>
                        ${s.caption ? `<div class="slide-caption">"${s.caption}"</div>` : ''}
                        <div class="slide-author">— ${s.user_name}</div>
                        ${showVotes && s.votes > 0 ? `<div class="slide-votes">💛 ${s.votes} vote${s.votes !== 1 ? 's' : ''}</div>` : ''}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function showSlide(idx) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            const total = slides.length + 1; // +1 for title slide
            currentIndex = ((idx % total) + total) % total;
            const el = document.getElementById('slide-' + currentIndex);
            if (el) el.classList.add('active');
        }

        function nextSlide() { showSlide(currentIndex + 1); }
        function prevSlide() { showSlide(currentIndex - 1); }

        function startAuto() {
            if (interval) clearInterval(interval);
            interval = setInterval(() => { if (!paused) nextSlide(); }, 6000);
        }

        function togglePause() {
            paused = !paused;
            document.getElementById('pause-btn').textContent = paused ? '▶ Play' : '⏸ Pause';
        }

        async function switchMode(newMode) {
            if (newMode === mode) return;
            mode = newMode;
            updateModeButtons();
            const data = mode === 'winners' ? await loadWinners() : await loadAll();
            slides = data || [];
            if (slides.length === 0) {
                document.getElementById('slideshow').innerHTML = '<div class="slide active title-slide"><h1>No photos in this mode!</h1></div>';
                return;
            }
            renderSlides();
            showSlide(0);
        }

        function updateModeButtons() {
            document.getElementById('btn-all').className = mode === 'all' ? 'active-mode' : '';
            document.getElementById('btn-winners').className = mode === 'winners' ? 'active-mode' : '';
            document.getElementById('btn-votes').className = showVotes ? 'active-mode' : '';
            document.getElementById('btn-votes').textContent = showVotes ? '🙈 Hide Votes' : 'Show Votes';
        }

        function toggleVotes() {
            showVotes = !showVotes;
            updateModeButtons();
            const saved = currentIndex;
            renderSlides();
            showSlide(saved);
        }

        function backToStart() {
            if (interval) clearInterval(interval);
            paused = false;
            document.getElementById('slideshow').innerHTML = '';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'p') togglePause();
            if (e.key === 'Escape') backToStart();
        });
    </script>
</body>
</html>
