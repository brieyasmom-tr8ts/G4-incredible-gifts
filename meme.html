<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f7f0eb">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>What Do You Meme? - G4 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:wght@400;500&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --cream: #f7f0eb;
            --taupe: #7a6b63;
            --sage: #8a9e7a;
            --blush: #c9908a;
            --warm-grey: #c8b9b0;
            --dark-text: #4a3728;
            --light-text: #8a7b72;
            --accent: #b87a6e;
            --rose: #d4a59a;
            --shadow-sm: 0 2px 8px rgba(74, 55, 40, 0.06);
            --shadow-md: 0 4px 16px rgba(74, 55, 40, 0.08);
            --shadow-lg: 0 12px 32px rgba(74, 55, 40, 0.1);
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Georgia, serif;
            background: var(--cream);
            color: var(--dark-text);
            display: flex;
            flex-direction: column;
        }

        /* ====== SCREENS ====== */
        .screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
        .screen.active { display: flex; }

        /* ====== LOGIN ====== */
        #screen-login {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        #screen-login p {
            color: var(--light-text);
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        #screen-login a {
            color: var(--accent);
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* ====== WAITING ====== */
        #screen-waiting {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .waiting-icon { font-size: 4rem; margin-bottom: 16px; }
        .waiting-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .waiting-sub {
            color: var(--light-text);
            font-size: 1rem;
        }
        .pulse-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s ease infinite;
            margin-left: 4px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* ====== CAPTION WRITING (timer active) ====== */
        #screen-caption {
            padding: 0;
        }
        .caption-header {
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(200,185,176,0.3);
        }
        .caption-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark-text);
        }
        .phone-timer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        .phone-timer-num {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
            transition: color 0.3s;
        }
        .phone-timer-num.urgent { color: #d45a4a; }
        .phone-timer-label {
            font-size: 0.85rem;
            color: var(--light-text);
        }
        .phone-timer-bar {
            width: 80%;
            max-width: 280px;
            height: 5px;
            background: rgba(200,185,176,0.25);
            border-radius: 3px;
            margin: 6px auto 0;
            overflow: hidden;
        }
        .phone-timer-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.5s linear, background 0.3s;
        }
        .phone-timer-fill.urgent { background: #d45a4a; }

        /* Meme thumbnail */
        .phone-meme {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            overflow: hidden;
        }
        .phone-meme img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            object-fit: contain;
        }

        /* Caption input area */
        .caption-input-area {
            padding: 16px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            background: #fff;
            border-top: 1px solid rgba(200,185,176,0.3);
        }
        .caption-input-row {
            display: flex;
            gap: 8px;
        }
        .caption-input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--warm-grey);
            border-radius: 12px;
            font-size: 1.05rem;
            background: var(--cream);
            color: var(--dark-text);
            outline: none;
            transition: border-color 0.2s;
        }
        .caption-input-row input:focus {
            border-color: var(--accent);
        }
        .caption-input-row button {
            padding: 12px 20px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .caption-input-row button:active { transform: scale(0.96); opacity: 0.9; }
        .caption-input-row button:disabled {
            background: var(--warm-grey);
            cursor: default;
        }
        .caption-status {
            text-align: center;
            font-size: 0.85rem;
            color: var(--light-text);
            margin-top: 8px;
        }
        .caption-status.submitted { color: var(--sage); font-weight: 600; }

        /* ====== SUBMITTED / WATCH SCREEN ====== */
        #screen-submitted {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .submitted-check {
            width: 80px; height: 80px;
            background: var(--sage);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .submitted-check svg { width: 40px; height: 40px; }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .submitted-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .submitted-caption-preview {
            font-size: 1.1rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: rgba(184, 122, 110, 0.08);
            border-radius: 12px;
            max-width: 320px;
        }
        .submitted-caption-preview::before,
        .submitted-caption-preview::after {
            content: '"';
            color: var(--rose);
        }
        .submitted-sub {
            color: var(--light-text);
            font-size: 1rem;
        }
        .watching-animation {
            margin-top: 24px;
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .watching-dot {
            width: 10px; height: 10px;
            background: var(--rose);
            border-radius: 50%;
            animation: watchBounce 1.4s ease infinite;
        }
        .watching-dot:nth-child(2) { animation-delay: 0.2s; }
        .watching-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes watchBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dark-text);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 999;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
    <div class="waiting-icon">&#x1f5bc;</div>
    <p>Sign in on the main app first!</p>
    <a href="index.html">Go to app</a>
</div>

<!-- WAITING FOR ROUND -->
<div class="screen" id="screen-waiting">
    <div class="waiting-icon">&#x1f5bc;</div>
    <div class="waiting-title">What Do You Meme?</div>
    <div class="waiting-sub">Waiting for the next round<span class="pulse-dot"></span></div>
</div>

<!-- CAPTION WRITING -->
<div class="screen" id="screen-caption">
    <div class="caption-header">
        <h2>Write Your Caption!</h2>
        <div class="phone-timer">
            <span class="phone-timer-num" id="phone-timer-num">60</span>
            <span class="phone-timer-label">seconds left</span>
        </div>
        <div class="phone-timer-bar">
            <div class="phone-timer-fill" id="phone-timer-fill" style="width:100%;"></div>
        </div>
    </div>
    <div class="phone-meme">
        <img id="phone-meme-image" src="" alt="Meme">
    </div>
    <div class="caption-input-area">
        <div class="caption-input-row">
            <input type="text" id="caption-input" placeholder="Your funniest caption..." maxlength="200" autocomplete="off">
            <button id="submit-btn" onclick="submitCaption()">Send</button>
        </div>
        <div class="caption-status" id="caption-status">Make it funny!</div>
    </div>
</div>

<!-- SUBMITTED - WATCH SCREEN -->
<div class="screen" id="screen-submitted">
    <div class="submitted-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </div>
    <div class="submitted-title">Caption Sent!</div>
    <div class="submitted-caption-preview" id="submitted-preview"></div>
    <div class="submitted-sub">Now watch the screen!</div>
    <div class="watching-animation">
        <div class="watching-dot"></div>
        <div class="watching-dot"></div>
        <div class="watching-dot"></div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL = 'https://g4-retreat-api.brieyasmom.workers.dev';
let currentUser = null;
let currentRound = null;
let timerInterval = null;
let hasSubmitted = false;
let submittedCaption = '';

function setScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
}

function init() {
    const saved = localStorage.getItem('g4user');
    if (saved) {
        currentUser = JSON.parse(saved);
        setScreen('waiting');
        pollForRound();
    } else {
        setScreen('login');
    }
}

// Poll every 3 seconds for round state
let pollTimer = null;
function pollForRound() {
    loadRound();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(loadRound, 3000);
}

async function loadRound() {
    try {
        const userParam = currentUser ? `?user_id=${currentUser.id}` : '';
        const res = await fetch(`${API_URL}/api/meme/active${userParam}`);
        const data = await res.json();

        if (!data.active) {
            currentRound = null;
            hasSubmitted = false;
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            setScreen('waiting');
            return;
        }

        const prevRoundId = currentRound ? currentRound.id : null;
        currentRound = data;

        // New round? Reset state
        if (data.id !== prevRoundId) {
            hasSubmitted = false;
            submittedCaption = '';
        }

        // Check if user already submitted for this round
        if (data.my_caption) {
            hasSubmitted = true;
            submittedCaption = data.my_caption.caption;
        }

        // Set phone meme image
        document.getElementById('phone-meme-image').src = data.photo_data;

        // Check timer state
        const deadline = data.caption_deadline;
        if (deadline && deadline !== 'stopped') {
            const remaining = Math.max(0, Math.ceil((new Date(deadline) - Date.now()) / 1000));
            if (remaining > 0) {
                // Timer is active
                if (hasSubmitted) {
                    // Already submitted, show watch screen
                    document.getElementById('submitted-preview').textContent = submittedCaption;
                    setScreen('submitted');
                } else {
                    // Show caption input with timer
                    startPhoneTimer(deadline);
                    setScreen('caption');
                }
                return;
            }
        }

        // Timer ended or stopped
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

        if (hasSubmitted) {
            document.getElementById('submitted-preview').textContent = submittedCaption;
            setScreen('submitted');
        } else if (deadline === 'stopped' || (deadline && new Date(deadline) < new Date())) {
            // Time's up, didn't submit
            setScreen('submitted');
            document.querySelector('.submitted-title').textContent = "Time's up!";
            document.getElementById('submitted-preview').textContent = "You didn't submit a caption this round";
            document.querySelector('.submitted-sub').textContent = 'Watch the screen for the results!';
        } else {
            // No timer started yet, waiting
            setScreen('waiting');
        }

    } catch(e) {
        console.error('Poll error:', e);
    }
}

function startPhoneTimer(deadline) {
    const deadlineTime = new Date(deadline).getTime();
    // Estimate total seconds based on difference from now (max 60)
    const totalSeconds = Math.min(60, Math.ceil((deadlineTime - Date.now()) / 1000));

    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const remaining = Math.max(0, Math.ceil((deadlineTime - Date.now()) / 1000));
        const numEl = document.getElementById('phone-timer-num');
        const fillEl = document.getElementById('phone-timer-fill');

        numEl.textContent = remaining;
        const pct = (remaining / totalSeconds) * 100;
        fillEl.style.width = pct + '%';

        if (remaining <= 10) {
            numEl.classList.add('urgent');
            fillEl.classList.add('urgent');
        } else {
            numEl.classList.remove('urgent');
            fillEl.classList.remove('urgent');
        }

        if (remaining <= 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('caption-status').textContent = "Time's up!";
            // Switch to submitted/watch screen
            setTimeout(() => {
                if (hasSubmitted) {
                    document.getElementById('submitted-preview').textContent = submittedCaption;
                    setScreen('submitted');
                } else {
                    document.querySelector('.submitted-title').textContent = "Time's up!";
                    document.getElementById('submitted-preview').textContent = "Watch the screen!";
                    document.querySelector('.submitted-sub').textContent = '';
                    setScreen('submitted');
                }
            }, 1000);
        }
    }, 250);
}

async function submitCaption() {
    if (!currentUser || !currentRound) return;
    const input = document.getElementById('caption-input');
    const caption = input.value.trim();
    if (!caption) {
        showToast('Write a caption first!');
        return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;

    try {
        const displayName = currentUser.last_initial
            ? `${currentUser.first_name} ${currentUser.last_initial}.`
            : currentUser.first_name;

        const res = await fetch(`${API_URL}/api/meme/caption`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                round_id: currentRound.id,
                user_id: currentUser.id,
                user_name: displayName,
                caption
            })
        });
        const data = await res.json();
        if (data.error) {
            showToast(data.error);
            btn.disabled = false;
            return;
        }

        hasSubmitted = true;
        submittedCaption = caption;
        document.getElementById('submitted-preview').textContent = caption;
        // Reset the submitted screen text in case it was modified
        document.querySelector('.submitted-title').textContent = 'Caption Sent!';
        document.querySelector('.submitted-sub').textContent = 'Now watch the screen!';
        setScreen('submitted');
    } catch(e) {
        showToast('Failed to submit');
        btn.disabled = false;
    }
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// Enter key to submit
document.getElementById('caption-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitCaption();
});

init();
</script>
</body>
</html>
